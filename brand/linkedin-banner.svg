<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 627" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#161c24"/><stop offset="1" stop-color="#0d1116"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.4" r="0.5">
      <stop offset="0" stop-color="#ff9f1c" stop-opacity="0.22"/><stop offset="1" stop-color="#ff9f1c" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="627" fill="url(#bg)"/>
  <rect width="1200" height="627" fill="url(#glow)"/>

  <!-- stars -->
  <g fill="#e6edf3" opacity="0.5">
    <circle cx="90" cy="80" r="1.5"/><circle cx="300" cy="50" r="1"/><circle cx="520" cy="90" r="1.5"/>
    <circle cx="160" cy="560" r="1"/><circle cx="700" cy="540" r="1.5"/><circle cx="1120" cy="120" r="1"/>
    <circle cx="980" cy="560" r="1.5"/><circle cx="60" cy="320" r="1"/>
  </g>

  <!-- radar motif (right) -->
  <g transform="translate(900,300)">
    <g stroke="#2a3543" fill="none"><circle r="60"/><circle r="110"/><circle r="160"/></g>
    <path d="M0 0 L0 -160 A160 160 0 0 1 140 -78 Z" fill="#ff9f1c" opacity="0.14"/>
    <line x1="0" y1="0" x2="0" y2="-160" stroke="#ff9f1c" stroke-width="2.5"/>
    <circle r="11" fill="#ff9f1c"/>
    <circle cx="-58" cy="-48" r="6" fill="#2ecc71"/><circle cx="64" cy="-30" r="6" fill="#4dabf7"/>
    <circle cx="40" cy="70" r="6" fill="#2ecc71"/><circle cx="-70" cy="40" r="6" fill="#ffbf69"/>
    <circle cx="92" cy="96" r="5" fill="#4dabf7"/>
  </g>

  <!-- wordmark -->
  <text x="80" y="150" font-family="Segoe UI, system-ui, sans-serif" font-size="78" font-weight="800" fill="#e6edf3">🛰️ Orion<tspan fill="#ff9f1c">Watch</tspan></text>
  <text x="84" y="188" font-family="Segoe UI, system-ui, sans-serif" font-size="20" letter-spacing="5" fill="#8b98a8">BY ORIONSYSTEMS</text>

  <!-- tagline -->
  <text x="84" y="246" font-family="Segoe UI, system-ui, sans-serif" font-size="27" font-weight="600" fill="#ffbf69">Loyihalar · portlar · Docker — bitta paneldan kuzating</text>

  <!-- features -->
  <g font-family="Segoe UI, system-ui, sans-serif" font-size="23" fill="#e6edf3">
    <text x="86" y="316">🐳  Docker &amp; local portlar avtomatik aniqlanadi</text>
    <text x="86" y="360">🔑  Har loyihaga token (Telegram / GitHub)</text>
    <text x="86" y="404">🆕  Yangi loyiha — monitoring + Telegram alert</text>
    <text x="86" y="448">🌐  3 til: UZ · RU · EN</text>
    <text x="86" y="492">⚡  Nol kutubxona — Native · CLI · Docker image</text>
  </g>

  <!-- bottom bar -->
  <rect x="0" y="556" width="1200" height="71" fill="#0b0e12"/>
  <rect x="0" y="556" width="1200" height="2" fill="#ff9f1c" opacity="0.4"/>
  <text x="80" y="600" font-family="Consolas, monospace" font-size="22" fill="#4dabf7">github.com/behruzops/orionwatch</text>
  <text x="1120" y="600" text-anchor="end" font-family="Segoe UI, system-ui, sans-serif" font-size="19" fill="#8b98a8">Node.js · cross-platform · open</text>
</svg>
